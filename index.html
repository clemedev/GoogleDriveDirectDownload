  <body>
    <h1>Google Drive Direct Download Manager</h1>

   <div class="form">
      <form id="form">
        <h2>Google Drive Shared Link:</h2>
        <input
          type="url"
          name="url"
          id="drive_link"
          placeholder="https://drive.google.com/file/d/"
          pattern="^https://www.scribd.com/document/[0-9]{9}/.+$"
          minlength="45"
          required
        />
        <button type="submit" id="submit">Submit</button>
      </form>
    </div>

    <h3>Output:</h3>

    <a id="outputLink" href="" target="_blank" rel="noopener noreferrer"
      ><p id="output"></p
    ></a>
